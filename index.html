<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f766e">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon-180.png">
<title>Makotsu Shift v21 りえちゃん表・PDF版</title>
<style>
:root{--bg:#f8fafc;--card:#fff;--ink:#0f172a;--muted:#64748b;--line:#cbd5e1;--ok:#047857;--ng:#b91c1c;--teal:#0f766e;--amber:#b45309}
*{box-sizing:border-box}html,body{margin:0;max-width:100%;overflow-x:hidden;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
button,input{font:inherit}button{min-height:48px;border:0;border-radius:12px;padding:10px 14px;font-weight:900;cursor:pointer}
.app{max-width:900px;margin:auto;padding:12px 10px 40px}
.hero{padding:16px;border-radius:18px;background:linear-gradient(135deg,#ecfeff,#f0fdf4);border:1px solid #99f6e4}
.kicker{font-size:11px;font-weight:900;letter-spacing:.08em;color:var(--teal)}h1{font-size:23px;margin:5px 0}.hero p{margin:5px 0;color:#475569;line-height:1.5}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}label{display:block;font-size:12px;font-weight:900;color:#475569;margin-bottom:5px}input[type=date]{width:100%;min-height:48px;border:1px solid var(--line);border-radius:12px;padding:8px 10px;background:#fff}
.primary{background:var(--teal);color:#fff}.secondary{background:#fff;color:var(--teal);border:1px solid #5eead4}.secondary:disabled{opacity:.45}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0}.stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:10px}.stat b{display:block;font-size:17px}.stat span{font-size:11px;color:var(--muted)}
.notice{display:none;margin:12px 0;padding:12px;border-radius:12px;font-weight:800;line-height:1.55}.notice.show{display:block}.notice.ok{background:#ecfdf5;color:var(--ok);border:1px solid #a7f3d0}.notice.ng{background:#fef2f2;color:var(--ng);border:1px solid #fecaca}
.repair{display:none;margin:12px 0;padding:12px;border:2px solid #f59e0b;border-radius:14px;background:#fffbeb}.repair.show{display:block}.repair h2{font-size:18px;margin:0 0 8px}.issue{background:#fff;border:1px solid #fcd34d;border-radius:10px;padding:10px;margin:8px 0}.issue strong{display:block}.issue small{color:#475569}#autoRepair{width:100%;background:#d97706;color:#fff;margin-top:8px}
.store{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;margin:14px 0;box-shadow:0 4px 14px rgba(15,23,42,.05)}.store h2{display:flex;justify-content:space-between;align-items:center;margin:0 0 9px;font-size:20px}.store h2 span{font-size:12px;color:var(--muted)}.day{border:1px solid #e2e8f0;border-radius:10px;overflow:hidden;margin:9px 0}.dayhead{background:#f1f5f9;padding:8px 10px;font-weight:900}.row{display:grid;grid-template-columns:90px 1fr;gap:10px;padding:8px 10px;border-top:1px solid #eef2f7}.time{font-weight:900;color:var(--teal)}
.footer{font-size:11px;color:var(--muted);text-align:center;margin-top:18px}
@media(max-width:650px){.controls{grid-template-columns:1fr}.summary{grid-template-columns:1fr 1fr}.app{padding:8px 7px 28px}.hero{padding:12px}h1{font-size:20px}.row{grid-template-columns:78px 1fr;padding:8px}}

.timeline-wrap{display:none;margin:14px 0}.timeline-wrap.show{display:block}
.timeline-toolbar{display:flex;align-items:end;justify-content:space-between;gap:10px;margin:0 2px 8px}
.timeline-toolbar h2{margin:0;font-size:20px}.timeline-toolbar small{color:var(--muted);font-weight:800}
.timeline-store{background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px;margin:12px 0;overflow:hidden}
.timeline-store h3{margin:0 0 8px;font-size:19px}
.timeline-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid #cbd5e1;border-radius:10px}
.timeline-grid{min-width:1150px}
.timeline-header,.timeline-day-row{display:grid;grid-template-columns:98px repeat(24,minmax(42px,1fr))}
.timeline-header{position:sticky;top:0;z-index:4;background:#f8fafc}
.timeline-header>div,.timeline-day-label{min-height:34px;border-right:1px solid #dbe3ec;border-bottom:1px solid #dbe3ec}
.timeline-header>div{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900}
.timeline-corner{position:sticky;left:0;z-index:6;background:#f8fafc}
.timeline-day-label{position:sticky;left:0;z-index:3;background:#fff;padding:6px 7px;font-size:12px;font-weight:900}
.timeline-day-track{grid-column:2 / 26;position:relative;min-height:66px;background:
  repeating-linear-gradient(to right,transparent 0,transparent calc(100%/24 - 1px),#dbe3ec calc(100%/24 - 1px),#dbe3ec calc(100%/24));
  border-bottom:1px solid #dbe3ec}
.shift-bar{position:absolute;height:22px;border-radius:7px;background:#d1fae5;border:1px solid #6ee7b7;color:#065f46;font-size:10px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:3px 5px;line-height:14px}
.shift-bar:nth-child(3n+2){background:#dbeafe;border-color:#93c5fd;color:#1e3a8a}
.shift-bar:nth-child(3n+3){background:#fef3c7;border-color:#fcd34d;color:#92400e}
.print-title{display:none}
@media(max-width:650px){
  .timeline-store{padding:7px}
  .timeline-header,.timeline-day-row{grid-template-columns:82px repeat(24,minmax(40px,1fr))}
}
@page{size:A4 landscape;margin:7mm}
@media print{
  html,body{background:#fff!important}
  .hero,.summary,.notice,.repair,.footer,#schedule,.timeline-toolbar{display:none!important}
  .app{max-width:none;padding:0}
  .timeline-wrap{display:block!important;margin:0}
  .timeline-store{page-break-after:always;break-after:page;border:0;box-shadow:none;padding:0;margin:0}
  .timeline-store:last-child{page-break-after:auto;break-after:auto}
  .timeline-scroll{overflow:visible;border:0}
  .timeline-grid{min-width:0;width:100%}
  .timeline-header,.timeline-day-row{grid-template-columns:26mm repeat(24,1fr)}
  .timeline-header>div,.timeline-day-label{min-height:7mm}
  .timeline-day-track{min-height:15mm}
  .timeline-day-label{font-size:8pt;padding:2mm;position:static}
  .timeline-corner,.timeline-header{position:static}
  .timeline-header>div{font-size:6pt}
  .shift-bar{height:5mm;font-size:6pt;line-height:3.4mm;padding:.7mm 1mm;border-radius:1.5mm}
  .print-title{display:block;margin:0 0 2mm;font-size:14pt}
}

</style>
</head>

function audit(rowsByStore){
 const issues=[];const all=[];const counts={};
 for(const [sk,label] of STORE_ORDER){const rows=rowsByStore[sk]||[];counts[sk]=rows.length;rows.forEach(r=>all.push(r));
   const goldenMap=new Map(GOLDEN[sk].map(r=>[key(r),r]));const rowMap=new Map(rows.map(r=>[key(r),r]));
   for(const [k,r] of goldenMap)if(!rowMap.has(k))issues.push({type:'missing',storeKey:sk,title:`${r.dateIso} ${label}：${r.name} ${r.time} が欠落`,proposal:'正本基準から復元',row:r});

 }
 const interval=r=>{const [sh,eh]=String(r.time).split('-').map(Number);const base=new Date(r.dateIso+'T00:00:00').getTime();const start=base+sh*3600000;const end=base+(eh<=sh?eh+24:eh)*3600000;return [start,end]};
 for(let i=0;i<all.length;i++)for(let j=i+1;j<all.length;j++){const a=all[i],b=all[j];if(a.name!==b.name||a.storeKey===b.storeKey||a.dateIso!==b.dateIso)continue;const [as,ae]=interval(a),[bs,be]=interval(b);if(as<be&&bs<ae)issues.push({type:'collision',title:`${a.name}：${a.dateIso} ${a.time}（${a.storeName}）と ${b.dateIso} ${b.time}（${b.storeName}）が重複`,proposal:'基準外側を削除',rows:[a,b]})}

function parseShiftTime(time){
  const parts=String(time).split("-").map(Number);
  if(parts.length!==2||parts.some(Number.isNaN))return null;
  let [start,end]=parts;
  if(end<=start)end+=24;
  return {start,end};
}
function timelinePosition(time){
  const parsed=parseShiftTime(time);
  if(!parsed)return null;
  let start=parsed.start,end=parsed.end;
  while(start<6){start+=24;end+=24}
  return {left:((start-6)/24)*100,width:((end-start)/24)*100};
}
function stackTimelineRows(rows){
  const sorted=[...rows].sort((a,b)=>{
    const pa=parseShiftTime(a.time)||{start:999};
    const pb=parseShiftTime(b.time)||{start:999};
    return pa.start-pb.start||String(a.name).localeCompare(String(b.name),"ja");
  });
  const laneEnds=[];
  return sorted.map(row=>{
    const parsed=parseShiftTime(row.time)||{start:0,end:0};
    let lane=laneEnds.findIndex(end=>end<=parsed.start);
    if(lane<0){lane=laneEnds.length;laneEnds.push(parsed.end)}
    else laneEnds[lane]=parsed.end;
    return {...row,lane};
  });
}
function renderTimeline(){
  if(!draft)return 0;
  const startIso=weekStart.value;
  let barCount=0;
  timeline.innerHTML=STORE_ORDER.map(([sk,label])=>{
    const rows=draft[sk]||[];
    const dates=[...new Set(rows.map(r=>r.dateIso))].sort();
    const days=dates.map(dateIso=>{
      const stacked=stackTimelineRows(rows.filter(r=>r.dateIso===dateIso));
      barCount+=stacked.length;
      const laneCount=Math.max(1,...stacked.map(r=>r.lane+1));
      const bars=stacked.map(r=>{
        const pos=timelinePosition(r.time);
        if(!pos)return "";
        return `<div class="shift-bar" style="left:${pos.left}%;width:${pos.width}%;top:${4+r.lane*25}px" title="${esc(r.name)} ${esc(r.time)}">${esc(r.name)} ${esc(r.time)}</div>`;
      }).join("");
      return `<div class="timeline-day-row">
        <div class="timeline-day-label">${dateLabel(dateIso)}</div>
        <div class="timeline-day-track" style="min-height:${Math.max(66,8+laneCount*25)}px">${bars}</div>
      </div>`;
    }).join("");
    const hours=Array.from({length:24},(_,i)=>`<div>${String((i+6)%24).padStart(2,"0")}</div>`).join("");
    return `<section class="timeline-store">
      <h2 class="print-title">${label}シフト表　${esc(startIso)}週</h2>
      <h3>${label}</h3>
      <div class="timeline-scroll"><div class="timeline-grid">
        <div class="timeline-header"><div class="timeline-corner">日付</div>${hours}</div>
        ${days}
      </div></div>
    </section>`;
  }).join("");
  return barCount;
}

function autoRepair(){if(!draft)return;const a=audit(draft);for(const i of a.issues){if(i.type==='missing'){if(!draft[i.storeKey].some(r=>key(r)===key(i.row)))draft[i.storeKey].push(clone(i.row));}else if(i.type==='extra'){draft[i.storeKey]=draft[i.storeKey].filter(r=>key(r)!==key(i.row));}}
